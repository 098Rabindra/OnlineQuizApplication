<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App - Main Page</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    width: 400px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    text-align: center;
    color: white;
}

h1 {
    margin-bottom: 30px;
}

.btn {
    width: 80%;
    padding: 12px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: rgba(255,255,255,0.4);
    transform: scale(1.05);
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.8;
}
</style>

</head>

<body>

<div class="container">
    <h1>Online Quiz System</h1>

    <button class="btn" onclick="userLogin()">User Login</button>
    <button class="btn" onclick="adminLogin()">Admin Login</button>

    <div class="footer">
        © 2026 Quiz Application
    </div>
</div>

<script>
function userLogin() {
    window.location.href = "/OnlineQuizApplication/login.html";
}

function adminLogin() {
    window.location.href = "/OnlineQuizApplication/login.html";
}
</script>

</body>
</html>
