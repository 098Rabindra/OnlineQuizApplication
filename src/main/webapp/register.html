<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

/* ================= BODY ================= */

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1d4ed8,
        #2563eb,
        #facc15
    );

    background-size:400% 400%;

    animation:bgAnimation 12s ease infinite;
}

/* ANIMATION */

@keyframes bgAnimation{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* GLOW EFFECT */

body::before{

    content:"";

    position:absolute;

    width:450px;
    height:450px;

    background:#2563eb;

    border-radius:50%;

    top:-120px;
    left:-120px;

    filter:blur(120px);

    opacity:0.5;
}

body::after{

    content:"";

    position:absolute;

    width:400px;
    height:400px;

    background:#facc15;

    border-radius:50%;

    bottom:-100px;
    right:-100px;

    filter:blur(120px);

    opacity:0.5;
}

/* ================= BACK BUTTON ================= */

.back-btn{

    position:fixed;

    top:20px;
    right:20px;

    padding:10px 18px;

    border:none;
    border-radius:12px;

    background:rgba(255,255,255,0.15);

    color:white;

    font-weight:bold;

    cursor:pointer;

    backdrop-filter:blur(10px);

    transition:0.3s;

    z-index:10;
}

.back-btn:hover{

    background:rgba(255,255,255,0.25);

    transform:translateY(-2px);
}

/* ================= CARD ================= */

.container{

    width:400px;

    padding:40px;

    border-radius:28px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.18);

    box-shadow:
        0 8px 40px rgba(0,0,0,0.35),
        inset 0 1px 1px rgba(255,255,255,0.12);

    text-align:center;

    color:white;

    position:relative;

    z-index:2;
}

/* ================= LOGO ================= */

.logo{

    width:85px;
    height:85px;

    margin:auto;
    margin-bottom:18px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #facc15,
        #f59e0b
    );

    color:#0f172a;

    font-size:34px;

    box-shadow:
        0 8px 25px rgba(250,204,21,0.45);
}

/* ================= TITLE ================= */

h2{

    font-size:32px;

    margin-bottom:10px;

    font-weight:700;
}

/* ================= TAGLINE ================= */

.tagline{

    font-size:14px;

    color:#e5e7eb;

    line-height:1.6;

    margin-bottom:28px;
}

/* ================= INPUT GROUP ================= */

.input-group{

    margin-bottom:18px;

    text-align:left;
}

.input-box{

    position:relative;
}

/* ICON */

.input-box i{

    position:absolute;

    left:15px;
    top:50%;

    transform:translateY(-50%);

    color:#facc15;
}

/* INPUT */

input{

    width:100%;

    padding:14px 14px 14px 45px;

    border:none;
    outline:none;

    border-radius:14px;

    background:rgba(255,255,255,0.14);

    color:white;

    font-size:15px;

    transition:0.3s;
}

input::placeholder{

    color:#d1d5db;
}

input:focus{

    background:rgba(255,255,255,0.22);

    transform:scale(1.02);

    box-shadow:
        0 0 12px rgba(250,204,21,0.35);
}

/* ================= BUTTON ================= */

.form-btn{

    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    background:linear-gradient(
        135deg,
        #facc15,
        #f59e0b
    );

    color:#111827;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:0.35s;

    margin-top:8px;

    box-shadow:
        0 8px 20px rgba(250,204,21,0.35);
}

.form-btn:hover{

    transform:translateY(-3px);

    box-shadow:
        0 12px 30px rgba(250,204,21,0.5);
}

/* ================= ERRORS ================= */

.error{

    color:#fde047;

    font-size:13px;

    margin-top:5px;

    padding-left:5px;
}

.error-input{

    border:2px solid #ef4444 !important;
}

.valid-input{

    border:2px solid #22c55e !important;
}

/* ================= LINK ================= */

a{

    display:block;

    margin-top:22px;

    color:white;

    text-decoration:none;

    font-size:14px;
}

a:hover{
    text-decoration:underline;
}

/* ================= MOBILE ================= */

@media(max-width:480px){

    .container{

        width:92%;

        padding:30px;
    }

    h2{
        font-size:28px;
    }
}

</style>
</head>

<body>

<!-- BACK BUTTON -->

<button class="back-btn" onclick="goBack()">
    ← Back
</button>

<!-- REGISTER CARD -->

<div class="container">

    <!-- LOGO -->

    <div class="logo">
        <i class="fa-solid fa-user-plus"></i>
    </div>

    <!-- TITLE -->

    <h2>Create Account</h2>

    <!-- TAGLINE -->

    <p class="tagline">
        Welcome to our Quiz Application —
        create your account and start your journey to challenge your knowledge.
    </p>

    <!-- FORM -->

    <form action="RegisterServlet"
          method="post"
          onsubmit="return validateForm()">

        <!-- NAME -->

        <div class="input-group">

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Full Name">

            </div>

            <div class="error" id="nameError"></div>

        </div>

        <!-- USERNAME -->

        <div class="input-group">

            <div class="input-box">

                <i class="fa-solid fa-id-badge"></i>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Username">

            </div>

            <div class="error" id="userError"></div>

        </div>

        <!-- PASSWORD -->

        <div class="input-group">

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password">

            </div>

            <div class="error" id="passError"></div>

        </div>

        <!-- BUTTON -->

        <button type="submit" class="form-btn">
            Register
        </button>

    </form>

    <a href="login.html">
        Already have an account? Login
    </a>

</div>

<script>

function goBack(){

    window.location.href="login.html";
}

function validateForm(){

    let name=document.getElementById("name");
    let username=document.getElementById("username");
    let password=document.getElementById("password");

    let nameError=document.getElementById("nameError");
    let userError=document.getElementById("userError");
    let passError=document.getElementById("passError");

    nameError.innerHTML="";
    userError.innerHTML="";
    passError.innerHTML="";

    name.classList.remove("error-input","valid-input");
    username.classList.remove("error-input","valid-input");
    password.classList.remove("error-input","valid-input");

    let isValid=true;

    // NAME

    let namePattern=
        /^[A-Z][a-z]+( [A-Z][a-z]+)*$/;

    if(name.value.trim()===""){

        nameError.innerHTML=
            "Name cannot be empty";

        name.classList.add("error-input");

        isValid=false;
    }

    else if(!namePattern.test(name.value.trim())){

        nameError.innerHTML=
            "Each word must start with capital letter";

        name.classList.add("error-input");

        isValid=false;
    }

    else{

        name.classList.add("valid-input");
    }

    // USERNAME

    if(username.value.trim()===""){

        userError.innerHTML=
            "Username cannot be empty";

        username.classList.add("error-input");

        isValid=false;
    }

    else if(username.value.length<8){

        userError.innerHTML=
            "Minimum 8 characters required";

        username.classList.add("error-input");

        isValid=false;
    }

    else if(!/^[A-Za-z]+$/.test(username.value.trim())){

        userError.innerHTML=
            "Only alphabets allowed";

        username.classList.add("error-input");

        isValid=false;
    }

    else{

        username.classList.add("valid-input");
    }

    // PASSWORD

    if(password.value.trim()===""){

        passError.innerHTML=
            "Password cannot be empty";

        password.classList.add("error-input");

        isValid=false;
    }

    else if(password.value.length<8){

        passError.innerHTML=
            "Password must be at least 8 characters";

        password.classList.add("error-input");

        isValid=false;
    }

    else{

        password.classList.add("valid-input");
    }

    return isValid;
}

/* SHOW URL ERRORS */

window.onload=function(){

    const params=
        new URLSearchParams(window.location.search);

    let userError=
        document.getElementById("userError");

    let username=
        document.getElementById("username");

    if(params.get("error")==="exists"){

        userError.innerHTML=
            "Username already exists";

        username.classList.add("error-input");
    }
};

</script>

</body>
</html>
